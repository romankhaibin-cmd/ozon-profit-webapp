<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Ozon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, sans-serif; padding: 16px; 
            background: var(--tg-theme-bg-color, #fff); 
            color: var(--tg-theme-text-color, #000);
        }
        h2 { margin-bottom: 20px; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { 
            width: 100%; padding: 14px; border: 1px solid #e0e0e0; 
            border-radius: 10px; font-size: 16px;
        }
        button { 
            width: 100%; padding: 16px; background: #3390ec; 
            color: #fff; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        button:disabled { opacity: 0.6; }
        .result { 
            margin-top: 20px; padding: 16px; background: #f0f7ff; 
            border-radius: 12px;
        }
        .result-item { 
            display: flex; justify-content: space-between; 
            margin-bottom: 12px; font-size: 15px; 
        }
        .profit-value { color: #28a745; font-size: 18px; font-weight: 700; }
        .error { 
            margin-top: 16px; padding: 12px; background: #ffebee; 
            border: 1px solid #f44336; border-radius: 8px; 
            color: #c62828; display: none;
        }
    </style>
</head>
<body>
    <h2>💰 Калькулятор Ozon</h2>
    
    <div class="form-group">
        <label>Цена продажи (₽)</label>
        <input type="number" id="price" placeholder="2500">
    </div>
    
    <div class="form-group">
        <label>Себестоимость (₽)</label>
        <input type="number" id="cost" placeholder="1200">
    </div>
    
    <div class="form-group">
        <label>Вес (кг)</label>
        <input type="number" id="weight" placeholder="0.3" step="0.1">
    </div>
    
    <button onclick="calculateProfit()" id="calcBtn">Рассчитать прибыль</button>
    
    <div class="error" id="error"></div>
