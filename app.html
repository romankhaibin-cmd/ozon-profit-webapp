<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Ozon Profit Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, sans-serif; padding: 16px; 
            background: var(--tg-theme-bg-color, #fff); 
            color: var(--tg-theme-text-color, #000);
        }
        h2 { margin-bottom: 20px; font-size: 22px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { 
            width: 100%; padding: 14px; border: 1px solid #e0e0e0; 
            border-radius: 10px; font-size: 16px;
        }
        button { 
            width: 100%; padding: 16px; background: #3390ec; 
            color: #fff; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        button:disabled { opacity: 0.6; }
        .result { 
            margin-top: 20px; padding: 16px; background: #f0f7ff; 
            border-radius: 12px;
        }
        .result-item { 
            display: flex; justify-content: space-between; 
            margin-bottom: 12px; font-size: 15px; 
        }
        .profit-value { color: #28a745; font-size: 18px; font-weight: 700; }
        .loading { text-align: center; padding: 20px; display: none; }
        .error { 
            margin-top: 16px; padding: 12px; background: #ffebee; 
            border: 1px solid #f44336; border-radius: 8px; 
            color: #c62828; display: none;
        }
    </style>
</head>
<body>
    <h2>💰 Калькулятор прибыли</h2>
    
    <div class="form-group">
        <label for="price">Цена продажи (₽)</label>
        <input type="number" id="price" placeholder="2500">
    </div>
    
    <div class="form-group">
        <label for="cost">Себестоимость (₽)</label>
        <input type="number" id="cost" placeholder="1200">
    </div>
    
    <div class="form-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="0.3" step="0.1">
    </div>
    
    <button onclick="calculateProfit()" id="calcBtn">Рассчитать прибыль</button>
    
    <div class="loading" id="loading">⏳ Считаем...</div>
    <div class="error" id="error"></div>
    
    <div class="result" id="result" style="display: none;">
        <div class="result-item">
            <span>Прибыль:</span>
            <span class="profit-value" id="profitValue">0 ₽</span>
        </div>
        <div class="result-item">
            <span>Маржинальность:</span>
            <span id="marginValue">0%</span>
        </div>
        <div class="result-item">
            <span>Комиссия Ozon:</span>
            <span id="commissionValue">0 ₽</span>
        </div>
    </div>

    <script>
        // ПЕРВОЕ: Объявляем переменную
        const NODUL_WEBHOOK_URL = 'https://webhook.nodul.ru/24648/dev/9d5ff094-8fbc-4465-9648-f6253efd1586';
        
        // ВТОРОЕ: Инициализируем Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
        }

        // ТРЕТЬЕ: Основная функция
        async function calculateProfit() {
            hideMessages();
            
            const price = document.getElementById('price').value;
            const cost = document.getElementById('cost').value;
            const weight = document.getElementById('weight').value;

            if (!price || !cost) {
                tg.showAlert('Введите цену и себестоимость!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('calcBtn').disabled = true;

            try {
                const response = await fetch(NODUL_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'calculate',
                        price: parseFloat(price),
                        cost: parseFloat(cost),
                        weight: parseFloat(weight) || 0.3
                    }),
                    mode: 'cors'
                });

                const text = await response.text();

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const data = JSON.parse(text);

                if (data.status === 'success') {
                    document.getElementById('profitValue').textContent = data.profit.toFixed(0) + ' ₽';
                    document.getElementById('marginValue').textContent = data.margin + '%';
                    document.getElementById('commissionValue').textContent = data.commission.toFixed(0) + ' ₽';
                    document.getElementById('result').style.display = 'block';
                } else {
                    throw new Error(data.error || 'Ошибка');
                }

            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('calcBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
