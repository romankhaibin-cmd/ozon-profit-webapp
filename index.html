<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ozon Profit Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            padding: 16px; 
            background: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
        }
        h2 { 
            margin-bottom: 20px; 
            font-size: 22px; 
            font-weight: 700;
        }
        .form-group { 
            margin-bottom: 16px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px;
            color: var(--tg-theme-text-color, #000000);
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            -webkit-appearance: none;
        }
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #3390ec);
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--tg-theme-button-color, #3390ec); 
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; 
            border-radius: 10px; 
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed;
        }
        .result { 
            margin-top: 20px; 
            padding: 16px; 
            background: var(--tg-theme-secondary-bg-color, #f0f7ff); 
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        .result-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .result-item:last-child {
            margin-bottom: 0;
        }
        .result-label {
            color: var(--tg-theme-text-color, #000000);
            font-weight: 500;
        }
        .result-value { 
            font-weight: 700;
            color: var(--tg-theme-text-color, #000000);
        }
        .profit-value { 
            color: #28a745; 
            font-size: 18px;
        }
        .loading { 
            text-align: center; 
            padding: 20px;
            color: var(--tg-theme-hint-color, #999999);
            display: none; 
        }
    </style>
</head>
<body>
    <h2>💰 Калькулятор прибыли</h2>
    
    <div class="form-group">
        <label for="price">Цена продажи (₽)</label>
        <input type="number" id="price" placeholder="2500" inputmode="decimal">
    </div>
    
    <div class="form-group">
        <label for="cost">Себестоимость (₽)</label>
        <input type="number" id="cost" placeholder="1200" inputmode="decimal">
    </div>
    
    <div class="form-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="0.3" step="0.1" inputmode="decimal">
    </div>
    
    <button onclick="calculateProfit()" id="calcBtn">Рассчитать прибыль</button>
    
    <div class="loading" id="loading">⏳ Считаем...</div>
    
    <div class="result" id="result" style="display: none;">
        <div class="result-item">
            <span class="result-label">Прибыль:</span>
            <span class="result-value profit-value" id="profitValue">0 ₽</span>
        </div>
        <div class="result-item">
            <span class="result-label">Маржинальность:</span>
            <span class="result-value" id="marginValue">0%</span>
        </div>
        <div class="result-item">
            <span class="result-label">Комиссия Ozon:</span>
            <span class="result-value" id="commissionValue">0 ₽</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const NODUL_WEBHOOK_URL = 'https://webhook.nodul.ru/24648/dev/9d5ff094-8fbc-44...';

        async function calculateProfit() {
            const price = document.getElementById('price').value;
            const cost = document.getElementById('cost').value;
            const weight = document.getElementById('weight').value;

            if (!price || !cost) {
                tg.showAlert('Введите цену и себестоимость!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('calcBtn').disabled = true;

            try {
                const response = await fetch(NODUL_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'calculate',
                        price: parseFloat(price),
                        cost: parseFloat(cost),
                        weight: parseFloat(weight) || 0.3,
                        user_id: tg.initDataUnsafe?.user?.id
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('profitValue').textContent = data.profit.toFixed(0) + ' ₽';
                    document.getElementById('marginValue').textContent = data.margin + '%';
                    document.getElementById('commissionValue').textContent = data.commission.toFixed(0) + ' ₽';
                    document.getElementById('result').style.display = 'block';
                } else {
                    tg.showAlert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }

            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Ошибка соединения с сервером');
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('calcBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
