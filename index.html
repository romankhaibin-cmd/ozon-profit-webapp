<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozon Profit Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            padding: 20px; 
            background: var(--tg-theme-bg-color, #fff); 
            color: var(--tg-theme-text-color, #000);
            margin: 0;
        }
        h2 { margin-top: 0; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--tg-theme-button-color, #3390ec); 
            color: var(--tg-theme-button-text-color, #fff);
            border: none; 
            border-radius: 8px; 
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f0f7ff; 
            border-radius: 8px;
            display: none;
        }
        .result.show { display: block; }
        .result-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px;
            font-size: 14px;
        }
        .result-value { font-weight: 600; }
        .profit { color: #28a745; font-size: 18px; }
        .loading { text-align: center; color: #666; display: none; }
    </style>
</head>
<body>
    <h2>💰 Калькулятор прибыли</h2>
    
    <div class="form-group">
        <label for="price">Цена продажи (₽)</label>
        <input type="number" id="price" placeholder="2500">
    </div>
    
    <div class="form-group">
        <label for="cost">Себестоимость (₽)</label>
        <input type="number" id="cost" placeholder="1200">
    </div>
    
    <div class="form-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="0.3" step="0.1">
    </div>
    
    <button onclick="calculateProfit()" id="calcBtn">Рассчитать прибыль</button>
    
    <div class="loading" id="loading">⏳ Считаем...</div>
    
    <div class="result" id="result">
        <div class="result-item">
            <span>Прибыль:</span>
            <span class="result-value profit" id="profitValue">0 ₽</span>
        </div>
        <div class="result-item">
            <span>Маржинальность:</span>
            <span class="result-value" id="marginValue">0%</span>
        </div>
        <div class="result-item">
            <span>Комиссия Ozon:</span>
            <span class="result-value" id="commissionValue">0 ₽</span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ⚠️ СЮДА ВСТАВИТЬ URL ИЗ NODUL (после создания сценария)
        const NODUL_WEBHOOK_URL = 'https://webhook.nodul.ru/24648/dev/9d5ff094-8fbc-4465-9648-f6253efd1586';

        async function calculateProfit() {
            const price = document.getElementById('price').value;
            const cost = document.getElementById('cost').value;
            const weight = document.getElementById('weight').value;

            if (!price || !cost) {
                tg.showAlert('Введите цену и себестоимость!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show');
            document.getElementById('calcBtn').disabled = true;

            try {
                const response = await fetch(NODUL_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'calculate',
                        price: parseFloat(price),
                        cost: parseFloat(cost),
                        weight: parseFloat(weight) || 0.3,
                        user_id: tg.initDataUnsafe?.user?.id
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('profitValue').textContent = data.profit.toFixed(0) + ' ₽';
                    document.getElementById('marginValue').textContent = data.margin + '%';
                    document.getElementById('commissionValue').textContent = data.commission.toFixed(0) + ' ₽';
                    document.getElementById('result').classList.add('show');
                } else {
                    tg.showAlert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }

            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Ошибка соединения с сервером');
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('calcBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
